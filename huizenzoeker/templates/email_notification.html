<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Nieuwe {{ noun }}</title></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#222">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:24px 0">
    <tr>
      <td align="center">
        <table role="presentation" width="540" cellpadding="0" cellspacing="0" style="background:white;border-radius:8px;overflow:hidden;border:1px solid #e2e2e2">
          <tr>
            <td style="padding:24px 28px;border-bottom:1px solid #eee">
              <h1 style="margin:0;font-size:18px;color:#1a73e8">Nieuwe {{ noun }} gevonden</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 28px">
              <p style="margin:0 0 8px;font-size:13px;color:#666">Plaats</p>
              <p style="margin:0 0 18px;font-size:16px;font-weight:600">{{ city or 'Onbekend' }}</p>

              <p style="margin:0 0 8px;font-size:13px;color:#666">Adres</p>
              <p style="margin:0 0 18px;font-size:16px;font-weight:600">{{ house.address_raw }}</p>

              <p style="margin:0 0 8px;font-size:13px;color:#666">Prijs</p>
              <p style="margin:0 0 24px;font-size:16px;font-weight:600">{{ price_str }} ({{ price_suffix }})</p>

              <p style="margin:0 0 8px;font-size:13px;color:#666">Bron</p>
              <p style="margin:0 0 24px;font-size:14px">{{ house.source }}</p>

              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:#1a73e8;border-radius:6px">
                    <a href="{{ house.source_url }}" target="_blank" rel="noopener"
                       style="display:inline-block;padding:12px 22px;color:white;text-decoration:none;font-weight:600;font-size:14px">
                      Bekijk advertentie &rarr;
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:14px 28px;background:#fafafa;border-top:1px solid #eee;font-size:11px;color:#888">
              Verzonden door Huizen Zoeker — automatische monitoring van huurwoningen.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
