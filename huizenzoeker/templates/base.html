<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Huizen Zoeker{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg:#fafafa; --fg:#222; --muted:#666; --accent:#1a73e8; --border:#e2e2e2; --ok:#0a7d2c; --bad:#b5162a; }
    * { box-sizing: border-box; }
    body { font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); margin: 0; }
    header { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
    header h1 { font-size: 16px; margin: 0; }
    nav a { color: var(--fg); text-decoration: none; padding: 6px 10px; border-radius: 4px; }
    nav a:hover { background: #f0f0f0; }
    nav a.active { background: var(--accent); color: white; }
    main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
    h2 { margin-top: 0; }
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { background: #f4f4f4; font-weight: 600; }
    tr:last-child td { border-bottom: 0; }
    .muted { color: var(--muted); font-size: 12px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .pill.ok { background: #e6f4ea; color: var(--ok); }
    .pill.failed, .pill.bad { background: #fce8eb; color: var(--bad); }
    .pill.running { background: #e8f0fe; color: var(--accent); }
    .pill.gray { background: #f0f0f0; color: #555; }
    .button, button, input[type=submit] { background: var(--accent); color: white; border: 0; border-radius: 4px; padding: 7px 14px; cursor: pointer; font-size: 13px; }
    .button.secondary, button.secondary { background: #eee; color: #333; }
    .button.danger, button.danger { background: var(--bad); }
    input[type=text], input[type=number], input[type=email] { padding: 6px 9px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .card { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 18px; margin-bottom: 18px; }
    .flash { padding: 10px 14px; border-radius: 4px; margin-bottom: 14px; }
    .flash.success { background: #e6f4ea; color: var(--ok); }
    .flash.error { background: #fce8eb; color: var(--bad); }
    a { color: var(--accent); }
    code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>Huizen Zoeker</h1>
    <nav>
      <a href="{{ url_for('web.houses') }}" class="{{ 'active' if request.endpoint == 'web.houses' else '' }}">Woningen</a>
      <a href="{{ url_for('web.settings_page') }}" class="{{ 'active' if request.endpoint == 'web.settings_page' else '' }}">Instellingen</a>
      <a href="{{ url_for('web.runs') }}" class="{{ 'active' if request.endpoint == 'web.runs' else '' }}">Runs</a>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
